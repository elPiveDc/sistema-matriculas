name: CI Pipeline

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - develop

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Show Files
        run: |
          pwd
          ls -R

      - name: Run Tests
        env:
          PYTHONPATH: .
        run: pytest tests/test_api.py
        
      - name: Run Linter
        run: |
          flake8 .